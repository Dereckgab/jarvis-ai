services:
  mysql:
    image: mysql:8.0
    container_name: jarvis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DATABASE_NAME:-jarvis}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DATABASE_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: jarvis-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jarvis-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8080}
      APP_READ_TIMEOUT: ${APP_READ_TIMEOUT:-60s}
      APP_WRITE_TIMEOUT: ${APP_WRITE_TIMEOUT:-60s}
      APP_SHUTDOWN_TIMEOUT: ${APP_SHUTDOWN_TIMEOUT:-10s}

      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-rootpassword}
      DATABASE_NAME: ${DATABASE_NAME:-jarvis}
      DATABASE_CHARSET: ${DATABASE_CHARSET:-utf8mb4}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-10}
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-100}
      DATABASE_CONN_MAX_LIFETIME: ${DATABASE_CONN_MAX_LIFETIME:-1h}

      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      REDIS_DB: ${REDIS_DB:-0}

      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-supersecretsecret}
      SECURITY_JWT_EXPIRES_IN: ${SECURITY_JWT_EXPIRES_IN:-15m}
      SECURITY_JWT_REFRESH_EXPIRES_IN: ${SECURITY_JWT_REFRESH_EXPIRES_IN:-7d}
      SECURITY_RATE_LIMIT_MAX: ${SECURITY_RATE_LIMIT_MAX:-100}
      SECURITY_RATE_LIMIT_WINDOW: ${SECURITY_RATE_LIMIT_WINDOW:-1s}
      SECURITY_CORS_ORIGINS: ${SECURITY_CORS_ORIGINS:-*}

      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_DEEPSEEK_API_KEY: ${AI_DEEPSEEK_API_KEY}
      AI_DEEPSEEK_BASE_URL: ${AI_DEEPSEEK_BASE_URL}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY}
      AI_OPENAI_BASE_URL: ${AI_OPENAI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TTS_PROVIDER: ${AI_TTS_PROVIDER:-local}
      AI_ELEVENLABS_API_KEY: ${AI_ELEVENLABS_API_KEY}
      AI_ELEVENLABS_VOICE_ID: ${AI_ELEVENLABS_VOICE_ID}

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-jarvis_memory}

      TELEMETRY_COLLECTOR_ENDPOINT: otel-collector:4317
      TELEMETRY_SERVICE_NAME: ${TELEMETRY_SERVICE_NAME:-jarvis-backend}
      TELEMETRY_SERVICE_VERSION: ${TELEMETRY_SERVICE_VERSION:-1.0.0}

    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: jarvis-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

volumes:
  mysql_data:
  redis_data:
  qdrant_data: